<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Plagiatsprüfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-white rounded-xl shadow-md p-8 border border-gray-100">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">🔍 Open Plagiatsprüfer</h1>
        <p class="text-gray-500 mb-6">Lade deine Arbeit als <code class="bg-gray-100 px-1 py-0.5 rounded">.pdf</code> oder <code class="bg-gray-100 px-1 py-0.5 rounded">.txt</code>-Datei hoch, um sie gegen das Web und wissenschaftliche Portale zu prüfen.</p>

        <div class="mb-6">
            <label class="block mb-2 text-sm font-medium text-gray-700">Wähle ein Dokument:</label>
            <input type="file" id="fileInput" accept=".pdf,.txt" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
        </div>

        <button onclick="uploadAndScan()" id="scanBtn" class="w-full bg-blue-600 text-white font-medium py-3 px-4 rounded-md hover:bg-blue-700 transition duration-150">
            Dokument scannen
        </button>

        <div id="loading" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="text-blue-600 mt-2 font-medium">Extrahiere Text und prüfe Quellen... Dies kann bis zu einer Minute dauern.</p>
        </div>

        <div id="error" class="hidden mt-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-md"></div>

        <div id="results" class="hidden mt-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Plagiatsbericht</h2>
            <div id="matchList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // Ersetze diese URL mit deiner echten Render-URL nach dem Deployment!
        const BACKEND_URL = "https://plagiarism-checker-backend-pys2.onrender.com";

        async function uploadAndScan() {
            const fileInput = document.getElementById('fileInput');
            const scanBtn = document.getElementById('scanBtn');
            const loading = document.getElementById('loading');
            const resultsDiv = document.getElementById('results');
            const matchList = document.getElementById('matchList');
            const errorDiv = document.getElementById('error');

            errorDiv.classList.add('hidden');
            resultsDiv.classList.add('hidden');
            matchList.innerHTML = '';

            if (fileInput.files.length === 0) {
                alert("Bitte wähle zuerst eine Datei aus!");
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            scanBtn.disabled = true;
            scanBtn.classList.add('opacity-50');
            loading.classList.remove('hidden');

            try {
                const response = await fetch(`${BACKEND_URL}/scan`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || "Serverfehler beim Scannen.");
                }

                const data = await response.json();
                
                if (data.matches && data.matches.length > 0) {
                    data.matches.forEach(match => {
                        const item = document.createElement('div');
                        item.className = "p-4 bg-yellow-50 border border-yellow-200 rounded-md";
                        // Extrahiere URL sauber aus dem String falls vorhanden
                        const urlMatch = match.source.match(/\((https?:\/\/[^\s)]+)\)/);
                        const cleanUrl = urlMatch ? urlMatch[1] : "#";

                        item.innerHTML = `
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-yellow-800">⚠️ ${match.score}% Übereinstimmung</span>
                            </div>
                            <a href="${cleanUrl}" target="_blank" class="text-blue-600 hover:underline text-sm break-all">
                                ${match.source}
                            </a>
                        `;
                        matchList.appendChild(item);
                    });
                } else {
                    const item = document.createElement('div');
                    item.className = "p-4 bg-green-50 border border-green-200 text-green-800 rounded-md";
                    item.innerHTML = "✅ Keine nennenswerten Plagiate gefunden!";
                    matchList.appendChild(item);
                }

                resultsDiv.classList.remove('hidden');

            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.classList.remove('hidden');
            } finally {
                scanBtn.disabled = false;
                scanBtn.classList.remove('opacity-50');
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
